<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adaptive Page Replacement Simulator</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        <header>
            <h1>Adaptive Page Replacement Simulator</h1>
            <p>Switches between FIFO and LRU based on fault rate in sliding window</p>
        </header>

        <div class="input-section">
            <h2>Configuration</h2>
            <div class="field-group">
                <div class="field">
                    <label for="frameCount">Number of Frames</label>
                    <input type="number" id="frameCount" placeholder="e.g. 3" min="1" max="10" value="3">
                </div>
                <div class="field field-wide">
                    <label for="pageString">Page Reference String</label>
                    <input type="text" id="pageString" placeholder="e.g. 1 2 3 4 1 2 5 1 2 3 4 5"
                        value="1 2 3 4 1 2 5 1 2 3 4 5">
                </div>
            </div>
            <button id="runBtn" onclick="runSimulation()">Run Simulation</button>
            <p class="hint">Algo switches to LRU if fault rate &gt; 60% in last 5 steps. Switches back if &le; 40%.</p>
        </div>

        <div id="resultsSection">
            <h2>Step-by-Step Output</h2>
            <div class="table-wrapper">
                <table>
                    <thead>
                        <tr>
                            <th>Step</th>
                            <th>Page</th>
                            <th>Result</th>
                            <th>Algorithm</th>
                            <th>Frames</th>
                        </tr>
                    </thead>
                    <tbody id="resultsBody">
                    </tbody>
                </table>
            </div>

            <div id="summary">
                <div class="summary-card">
                    <div class="label">Total Hits</div>
                    <div class="value" id="totalHits">-</div>
                </div>
                <div class="summary-card">
                    <div class="label">Total Faults</div>
                    <div class="value" id="totalFaults">-</div>
                </div>
                <div class="summary-card">
                    <div class="label">Hit Rate</div>
                    <div class="value" id="hitRate">-</div>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
